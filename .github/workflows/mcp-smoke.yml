name: mcp-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/loom_run/tools/**"
      - "tests/**"
      - ".github/workflows/mcp-smoke.yml"

jobs:
  mcp-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run MCP smoke tests
        run: python -m pytest -q tests/test_mcp_smoke.py
